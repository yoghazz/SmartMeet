version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartmeet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartmeet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartmeet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartmeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartmeet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: smartmeet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartmeet-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartmeet:password@postgres:5432/smartmeet_db
      SYNC_DATABASE_URL: postgresql://smartmeet:password@postgres:5432/smartmeet_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker (ASR) ────────────────────────────────────────────────────
  worker-asr:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartmeet-worker-asr
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartmeet:password@postgres:5432/smartmeet_db
      SYNC_DATABASE_URL: postgresql://smartmeet:password@postgres:5432/smartmeet_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker -Q asr -c 1 --loglevel=info

  # ── Celery Worker (NLP + DocGen) ───────────────────────────────────────────
  worker-nlp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartmeet-worker-nlp
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartmeet:password@postgres:5432/smartmeet_db
      SYNC_DATABASE_URL: postgresql://smartmeet:password@postgres:5432/smartmeet_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker -Q nlp,docgen -c 2 --loglevel=info

  # ── Celery Flower (monitoring) ─────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartmeet-flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    ports:
      - "5555:5555"
    command: celery -A app.workers.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
  minio_data:
